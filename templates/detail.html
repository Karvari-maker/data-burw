<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail {{ warga.nama }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .info {
            margin: 12px 0;
            font-size: 16px;
        }
        .label {
            font-weight: bold;
            color: #555;
        }
        a {
            display: inline-block;
            margin-bottom: 15px;
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← Kembali ke Pencarian</a>
        <h2>{{ warga.nama }}</h2>
        <div class="info"><span class="label">Jenis Kelamin:</span> 
            {{ 'Laki-laki' if warga.jenis_kelamin == 'L' else 'Perempuan' }}
        </div>
        <div class="info"><span class="label">Umur:</span> {{ warga.umur }} tahun</div>
        <div class="info"><span class="label">Pekerjaan:</span> {{ warga.pekerjaan }}</div>
        <div class="info"><span class="label">Alamat:</span> {{ warga.alamat }}</div>
    </div>
</body>
</html>
